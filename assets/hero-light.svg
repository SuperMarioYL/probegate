<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="ProbeGate — per-span probe-validation gate for 国产模型 agents">
  <defs>
    <!-- 流光：渐变窗口整体左→右平移，无缝条件 = 窗口宽度恒定且循环两端窗口完全在文字 bbox 之外 -->
    <linearGradient id="hg" x1="-220%" y1="0%" x2="-100%" y2="0%">
      <stop offset="0%"  stop-color="#5E5CE6"/>
      <stop offset="50%" stop-color="#10A37F"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
      <animate attributeName="x1" values="-220%;100%" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-100%;220%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="880" height="300" fill="#F5F5F7"/>
  <text x="440" y="150" text-anchor="middle" font-size="60" font-weight="700" fill="url(#hg)">ProbeGate</text>
  <!-- tagline 入场：一次性淡入+上移(freeze)，仅装饰不载关键信息 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.8s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.4s" dur="0.8s" fill="freeze"/>
    <text x="440" y="196" text-anchor="middle" font-size="17" font-weight="500" fill="#6E6E73">per-span probe-validation gate for 国产模型 agents</text>
  </g>
  <!-- 域色脉冲点（装饰，无限循环）— 不确定度 ∧ 探针双信号 -->
  <g>
    <circle cx="420" cy="232" r="3" fill="#5E5CE6">
      <animate attributeName="opacity" values="0.35;1;0.35" keyTimes="0;0.5;1" dur="2.4s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </circle>
    <text x="430" y="236" font-size="14" font-weight="600" fill="#6E6E73">∧</text>
    <circle cx="460" cy="232" r="3" fill="#10A37F">
      <animate attributeName="opacity" values="0.35;1;0.35" keyTimes="0;0.5;1" dur="2.4s" begin="-1.2s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
