<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="ProbeGate 架构：Agent loop → ProbeGate 拦截器 → (UncertaintyAdapter ∧ Probe Registry) → GateDecision → 人工兜底">
  <defs>
    <marker id="ah-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5A5A66"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#1D1D1F"/>

  <g stroke="#3A3A44" stroke-width="1.5" fill="none">
    <line x1="170" y1="180" x2="200" y2="180" marker-end="url(#ah-d)"/>
    <path d="M346,180 L362,180 L362,100 L376,100" marker-end="url(#ah-d)"/>
    <path d="M346,180 L362,180 L362,260 L376,260" marker-end="url(#ah-d)"/>
    <path d="M544,100 L560,100 L560,180 L574,180" marker-end="url(#ah-d)"/>
    <path d="M544,260 L560,260 L560,180 L574,180" marker-end="url(#ah-d)"/>
    <line x1="714" y1="180" x2="742" y2="180" marker-end="url(#ah-d)"/>
  </g>

  <g stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="170" y1="180" x2="196" y2="180" stroke="#4DA3FF" stroke-opacity="0.6" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" repeatCount="indefinite"/>
    </line>
    <path d="M346,180 L362,180 L362,100 L374,100" stroke="#8985FF" stroke-opacity="0.6" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M346,180 L362,180 L362,260 L374,260" stroke="#2DC79A" stroke-opacity="0.6" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M544,100 L560,100 L560,180 L572,180" stroke="#8985FF" stroke-opacity="0.6" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-1.0s" repeatCount="indefinite"/>
    </path>
    <path d="M544,260 L560,260 L560,180 L572,180" stroke="#2DC79A" stroke-opacity="0.6" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-1.2s" repeatCount="indefinite"/>
    </path>
    <line x1="714" y1="180" x2="740" y2="180" stroke="#2DC79A" stroke-opacity="0.6" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-0.6s" repeatCount="indefinite"/>
    </line>
  </g>

  <g>
    <circle r="3" fill="#4DA3FF">
      <animateMotion path="M170,180 L196,180" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#8985FF">
      <animateMotion path="M346,180 L362,180 L362,100 L374,100" dur="2.4s" begin="-0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" begin="-0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#2DC79A">
      <animateMotion path="M346,180 L362,180 L362,260 L374,260" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#2DC79A">
      <animateMotion path="M714,180 L740,180" dur="2.4s" begin="-1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" begin="-1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <rect x="24" y="140" width="146" height="80" rx="15" fill="#4DA3FF" fill-opacity="0.16" stroke="#4DA3FF" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.16;0.24;0.16" keyTimes="0;0.5;1" dur="3.2s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="97" y="176" text-anchor="middle" font-size="14" font-weight="600" fill="#4DA3FF">Agent Loop</text>
    <text x="97" y="194" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">国产 model · spans</text>

    <rect x="200" y="140" width="146" height="80" rx="15" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.16;0.24;0.16" keyTimes="0;0.5;1" dur="3.2s" begin="-1.1s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="273" y="176" text-anchor="middle" font-size="14" font-weight="600" fill="#8985FF">ProbeGate</text>
    <text x="273" y="194" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">Interceptor</text>

    <rect x="376" y="64" width="168" height="72" rx="15" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.16;0.24;0.16" keyTimes="0;0.5;1" dur="3.2s" begin="-1.7s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="460" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#8985FF">UncertaintyAdapter</text>
    <text x="460" y="114" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">logprob &gt; τ (信号 a)</text>

    <rect x="376" y="224" width="168" height="72" rx="15" fill="#2DC79A" fill-opacity="0.16" stroke="#2DC79A" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.16;0.24;0.16" keyTimes="0;0.5;1" dur="3.2s" begin="-2.3s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="460" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#2DC79A">Probe Registry</text>
    <text x="460" y="274" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">compile·test·lint·schema (信号 b)</text>

    <rect x="574" y="140" width="140" height="80" rx="15" fill="#2DC79A" fill-opacity="0.16" stroke="#2DC79A" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.16;0.24;0.16" keyTimes="0;0.5;1" dur="3.2s" begin="-2.8s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="644" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#2DC79A">GateDecision</text>
    <text x="644" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#2DC79A">handoff ⟺ a ∧ b</text>
    <text x="644" y="206" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">proceed · abstain · handoff</text>

    <rect x="742" y="140" width="120" height="80" rx="15" fill="#4DA3FF" fill-opacity="0.16" stroke="#4DA3FF" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.16;0.24;0.16" keyTimes="0;0.5;1" dur="3.2s" begin="-3.3s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="802" y="172" text-anchor="middle" font-size="13" font-weight="600" fill="#4DA3FF">Per-span UI</text>
    <text x="802" y="190" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">CLI · web</text>
    <text x="802" y="206" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">→ HumanRoute</text>
  </g>
</svg>
